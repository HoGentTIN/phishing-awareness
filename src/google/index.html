<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
        <link rel="stylesheet" href="style.css" />
        <link rel="shortcut icon" href="images/favicon.ico" />
        <link
            href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap"
            rel="stylesheet"
        />

        <title>Inloggen - Google Accounts</title>
    </head>
    <body>
        <div
            class="container-fluid p-0 vh-100 d-flex align-items-center justify-content-center"
        >
            <div class="row justify-content-center w-100">
                <div class="col-12 col-lg-8 col-xxl-6">
                    <div class="card border-0 mb-3 p-3">
                        <div class="card-body">
                            <div class="row">
                                <div class="col-12 col-xxl-6">
                                    <svg
                                        class="mb-3"
                                        xmlns="https://www.w3.org/2000/svg"
                                        width="48"
                                        height="48"
                                        viewBox="0 0 40 48"
                                        aria-hidden="true"
                                        jsname="jjf7Ff"
                                    >
                                        <path
                                            fill="#4285F4"
                                            d="M39.2 24.45c0-1.55-.16-3.04-.43-4.45H20v8h10.73c-.45 2.53-1.86 4.68-4 6.11v5.05h6.5c3.78-3.48 5.97-8.62 5.97-14.71z"
                                        ></path>
                                        <path
                                            fill="#34A853"
                                            d="M20 44c5.4 0 9.92-1.79 13.24-4.84l-6.5-5.05C24.95 35.3 22.67 36 20 36c-5.19 0-9.59-3.51-11.15-8.23h-6.7v5.2C5.43 39.51 12.18 44 20 44z"
                                        ></path>
                                        <path
                                            fill="#FABB05"
                                            d="M8.85 27.77c-.4-1.19-.62-2.46-.62-3.77s.22-2.58.62-3.77v-5.2h-6.7C.78 17.73 0 20.77 0 24s.78 6.27 2.14 8.97l6.71-5.2z"
                                        ></path>
                                        <path
                                            fill="#E94235"
                                            d="M20 12c2.93 0 5.55 1.01 7.62 2.98l5.76-5.76C29.92 5.98 25.39 4 20 4 12.18 4 5.43 8.49 2.14 15.03l6.7 5.2C10.41 15.51 14.81 12 20 12z"
                                        ></path>
                                    </svg>

                                    <h1 class="card-title">Inloggen</h1>
                                    <div class="card-text mb-5">
                                        Je Google-account gebruiken
                                    </div>
                                </div>
                                <div class="col-12 col-xxl-6 mt-xxl-5">
                                    <form action="../prevent-phishing.html">
                                        <div class="mb-4">
                                            <input
                                                type="email"
                                                class="form-control p-3"
                                                id="email"
                                                name="email"
                                                placeholder="E-mailadres of telefoonnummer"
                                                required
                                            />

                                            <div class="card-text ms-1">
                                                <a href="#">
                                                    E-mailadres vergeten?
                                                </a>
                                            </div>
                                        </div>

                                        <div class="card-text mb-5">
                                            Niet jouw computer? Gebruik een
                                            privévenster om in te loggen.<br />
                                            <a href="#">
                                                Meer informatie over het gebruik
                                                van de gastmodus
                                            </a>
                                        </div>

                                        <div
                                            class="card-text d-flex align-items-center justify-content-between"
                                        >
                                            <a href="#">Account maken</a>
                                            <button
                                                type="submit"
                                                class="btn btn-primary"
                                            >
                                                Volgende
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div
                        class="d-flex align-items-center justify-content-between"
                    >
                        <select
                            class="border-0 bg-transparent link-primary"
                            role="button"
                            name="language"
                            id="language"
                        >
                            <option value="nl">Nederlands</option>
                        </select>
                        <div class="footer-right">
                            <a href="#" class="me-3">Help</a>
                            <a href="#" class="me-3">Privacy</a>
                            <a href="#">Voorwaarden</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
